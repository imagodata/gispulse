# GISPulse — Tier → Features catalog (OSS)
#
# This file defines which technical features are available in each tier.
# It is consumed by `persistence/tier.py` and `core/plugin_hub.py` to enforce
# feature-locked gating in the AGPL OSS distribution.
#
# Pricing (EUR amounts, billing cycles, early-adopter terms) lives in
# `gispulse-enterprise/config/pricing_commercial.yml` and is NOT part of OSS.
#
# Cf. docs/OSS_SPLIT_PLAN.md §2.1 (Feature-locked model).

tiers:
  community:
    aliases: [free]
    features:
      - core_engine
      - duckdb
      - cli
      - portal_single_user
      - sdk
      - qgis_plugin
      - docker
      - local_triggers
    limits:
      datasets: unlimited_local
      api_keys: 0
      users: 1
      projects: 1
      maps: 5

  pro:
    inherits: community
    features:
      - postgis
      - hybrid
      - esb_triggers
      - dag_executor
      - visual_editor
      - monitoring
      - cron_pipelines
      - raster
      - network
    limits:
      instances: 1
      api_keys: 5
      datasets: 50
      projects: 5
      maps: 100

  team:
    inherits: pro
    features:
      - rbac
      - multi_project
      - support_48h
    limits:
      instances: 2
      api_keys: 20
      datasets: unlimited
      projects: unlimited
      maps: unlimited

  enterprise:
    inherits: team
    features:
      - sso_saml_oidc
      - clustering
      - white_label
      - sla_4h
      - custom_capabilities
    limits:
      instances: unlimited
      api_keys: unlimited
      datasets: unlimited
      projects: unlimited
      maps: unlimited

# ---------------------------------------------------------------------------
# Feature descriptions / per-feature caps
#
# Informational metadata consumed by docs / UI. Caps under `local_triggers`
# are also enforced at runtime in `gispulse.adapters.http.routers.triggers_router`
# when the active tier == "community". Pro+ has the parallel feature
# `esb_triggers` (uncapped, pg_notify-backed, cluster-grade).
# ---------------------------------------------------------------------------
features:
  local_triggers:
    description: >
      Local DML triggers via in-process bus + WebSocket. Single-process,
      best-effort, no DLQ/cron/webhook. Pro tier (esb_triggers) for
      cluster/durability.
    caps:
      max_active_triggers: 5
      single_process_only: true
      durability: "best_effort"
      cron: false
      outbound_webhook: false
      max_cascade_depth: 1

  esb_triggers:
    description: >
      Cluster-grade DML triggers via PostgreSQL pg_notify, with DLQ,
      circuit breakers, cron schedules, and outbound webhooks. Requires
      Pro tier and a PostGIS engine.
    caps:
      max_active_triggers: unlimited
      single_process_only: false
      durability: "at_least_once"
      cron: true
      outbound_webhook: true
      max_cascade_depth: unlimited
