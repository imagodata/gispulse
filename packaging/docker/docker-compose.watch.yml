# GISPulse watch — single-service docker-compose example.
#
# Usage:
#   1. Copy this file to your deployment dir
#   2. Drop your GPKG + rules.yaml under ./data/
#   3. docker compose -f docker-compose.watch.yml up -d
#
# To watch multiple GPKGs, copy the `watch` service block under different
# names (e.g. `watch-parcels`, `watch-roads`) and adjust GISPULSE_GPKG /
# command per-instance.

services:

  watch:
    image: ghcr.io/imagodata/gispulse-watch:1.3.0
    # For local builds:
    # build:
    #   context: ../..
    #   dockerfile: packaging/docker/Dockerfile.watch
    #   args:
    #     GISPULSE_VERSION: local

    container_name: gispulse-watch

    # tini (in the image) forwards SIGTERM correctly so `docker compose
    # stop` drains in-flight rows before exit (≤ 2 s).
    stop_grace_period: 10s

    # Bind-mount the data directory so the watcher sees your GPKG +
    # rules. The container runs as uid 1000 — make sure host files are
    # readable / writable by uid 1000 (or chown them).
    volumes:
      - ./data:/data:rw

    # Override the entrypoint args. The image entrypoint is already
    # `gispulse watch`, so `command:` is just the args.
    command:
      - /data/parcels.gpkg
      - --rules
      - /data/parcels.rules.yaml
      - --dataset-id
      - parcels-prod
      - --poll-ms
      - "500"
      - --batch-limit
      - "200"
      - --bulk-threshold
      - "1000"  # absorb 1000+ row imports into a single bulk.changed event

    # Restart on crash, NOT on clean exit.
    restart: on-failure:5

    # Resource ceilings. Adjust per workload — single watcher with ~100
    # active rules typically sits under 100 MB.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

    # Healthcheck is baked into the image (gispulse --help). docker / k8s
    # restart automatically when 3 consecutive checks fail.

    # Logs go to stdout/stderr (JSON on stderr per cli_watch convention)
    # — collect via your usual log driver. Default driver is fine for
    # `docker compose logs -f`.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
