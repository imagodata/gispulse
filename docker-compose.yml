services:
  postgis:
    image: postgis/postgis:16-3.4
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gispulse
      POSTGRES_PASSWORD: gispulse
      POSTGRES_DB: gispulse
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gispulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  gispulse-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      GISPULSE_ENGINE: duckdb
      GISPULSE_DSN: postgresql://gispulse:gispulse@postgis:5432/gispulse
      GISPULSE_STORAGE: sqlite
      GISPULSE_CORS_ORIGINS: "https://imagodata.github.io,https://demo.gispulse.dev"
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - gispulse_data:/root/.gispulse
      - ./core:/app/core
      - ./capabilities:/app/capabilities
      - ./rules:/app/rules
      - ./orchestration:/app/orchestration
      - ./persistence:/app/persistence
      - ./adapters:/app/adapters
      - ./cli.py:/app/cli.py
    command:
      - uvicorn
      - gispulse.adapters.http.app:create_app
      - --host=0.0.0.0
      - --port=8001
      - --factory
      - --reload
      - --reload-dir=/app/core
      - --reload-dir=/app/capabilities
      - --reload-dir=/app/rules
      - --reload-dir=/app/orchestration
      - --reload-dir=/app/persistence
      - --reload-dir=/app/adapters

  # NB: the portal dev server lives in the sibling repository
  # imagodata/gispulse-portal. To run it locally alongside this stack,
  # clone that repo and `pnpm dev` against VITE_API_URL=http://localhost:8001.

  # Martin tile server (Rust, MapLibre project). Serves MVT for
  # foncier-radar from the sibling repo gispulse-foncier/martin/config.yaml.
  # Reads the same PostgreSQL/PostGIS as gispulse-api, via the
  # radar_*_mvt PL/pgSQL functions installed by martin/migrations/.
  # See gispulse-foncier/martin/PHASE1_5_REPORT.md for the cutover details.
  martin:
    image: ghcr.io/maplibre/martin:1.10.1
    ports:
      - "3000:3000"
    environment:
      MARTIN_POSTGRES_DSN: postgresql://gispulse:gispulse@postgis:5432/gispulse
    volumes:
      - ../gispulse-foncier/martin/config.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  gispulse_data:

networks:
  default:
