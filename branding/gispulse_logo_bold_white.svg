<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150">
  <defs>
    <filter id="lightShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
      <feOffset dx="0.5" dy="0.5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond sombre -->
  <rect width="300" height="140" fill="#1a1a1a"/>

  <!-- LOGO ICONE -->
  <g transform="translate(10, 10)">
    <!-- Pulsing waves — synced to 2s base -->
    <circle cx="60" cy="60" r="8" fill="none" stroke="#666666" stroke-width="1.5" opacity="0">
      <animate attributeName="r" values="8;20;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="60" r="8" fill="none" stroke="#555555" stroke-width="1.2" opacity="0">
      <animate attributeName="r" values="8;26;8" dur="2s" repeatCount="indefinite" begin="-1.6s"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite" begin="-1.6s"/>
    </circle>
    <circle cx="60" cy="60" r="8" fill="none" stroke="#444444" stroke-width="1" opacity="0">
      <animate attributeName="r" values="8;32;8" dur="2s" repeatCount="indefinite" begin="-1.2s"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite" begin="-1.2s"/>
    </circle>

    <!-- Center node -->
    <circle cx="60" cy="60" r="4" fill="#FFFFFF" filter="url(#glow)">
      <animate attributeName="r" values="3.5;7;3.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Corner nodes — synced to 4s -->
    <circle cx="30" cy="30" r="4" fill="#E0E0E0" filter="url(#lightShadow)">
      <animate attributeName="r" values="4;5;4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="30" r="4" fill="#E0E0E0" filter="url(#lightShadow)">
      <animate attributeName="r" values="4;5;4" dur="4s" repeatCount="indefinite" begin="-3s"/>
    </circle>
    <circle cx="30" cy="90" r="4" fill="#E0E0E0" filter="url(#lightShadow)">
      <animate attributeName="r" values="4;5;4" dur="4s" repeatCount="indefinite" begin="-2s"/>
    </circle>
    <circle cx="90" cy="90" r="4" fill="#E0E0E0" filter="url(#lightShadow)">
      <animate attributeName="r" values="4;5;4" dur="4s" repeatCount="indefinite" begin="-1s"/>
    </circle>

    <!-- Connections -->
    <path d="M60,60 L30,30 M60,60 L90,30 M60,60 L30,90 M60,60 L90,90" stroke="#999999" stroke-width="0.6" opacity="0.5" fill="none"/>
    <path d="M30,30 L90,30 M30,90 L90,90 M30,30 L30,90 M90,30 L90,90" stroke="#777777" stroke-width="1" opacity="0.4" fill="none" stroke-dasharray="2,2"/>

    <!-- Orbiting electrons — synced to 16s, brighter colors for dark bg -->
    <circle r="5" fill="#2196F3" filter="url(#glow)">
      <animateMotion path="M60,60 m-35,0 a35,35 0 1,0 70,0 a35,35 0 1,0 -70,0z" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#F44336" filter="url(#glow)">
      <animateMotion path="M60,60 m0,-35 a35,35 0 1,0 0,70 a35,35 0 1,0 0,-70z" dur="16s" repeatCount="indefinite" begin="-12s"/>
    </circle>
    <circle r="5" fill="#FFC107" filter="url(#glow)">
      <animateMotion path="M60,60 m-25,-25 a35.36,35.36 0 1,0 50,50 a35.36,35.36 0 1,0 -50,-50z" dur="16s" repeatCount="indefinite" begin="-8s"/>
    </circle>
    <circle r="5" fill="#4CAF50" filter="url(#glow)">
      <animateMotion path="M60,60 m25,-25 a35.36,35.36 0 1,1 -50,50 a35.36,35.36 0 1,1 50,-50z" dur="16s" repeatCount="indefinite" begin="-4s"/>
    </circle>

    <!-- Mini electrons — synced to 8s -->
    <circle r="1.5" fill="#2196F3" filter="url(#glow)" opacity="0">
      <animateMotion path="M30,30 L90,30" dur="8s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#F44336" filter="url(#glow)" opacity="0">
      <animateMotion path="M30,30 L30,90" dur="8s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear" begin="-2s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" repeatCount="indefinite" begin="-2s"/>
    </circle>
    <circle r="1.5" fill="#FFC107" filter="url(#glow)" opacity="0">
      <animateMotion path="M30,30 L90,90" dur="8s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear" begin="-4s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" repeatCount="indefinite" begin="-4s"/>
    </circle>
    <circle r="1.5" fill="#E0E0E0" filter="url(#glow)" opacity="0">
      <animateMotion path="M90,30 L30,90" dur="8s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear" begin="-2s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" repeatCount="indefinite" begin="-2s"/>
    </circle>
    <circle r="1.5" fill="#4CAF50" filter="url(#glow)" opacity="0">
      <animateMotion path="M30,90 L90,90" dur="8s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear" begin="-4s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" repeatCount="indefinite" begin="-4s"/>
    </circle>
  </g>

  <!-- TEXTE RUBIK BOLD 700 EN BLANC -->
  <text x="115.61" y="80" font-family="Rubik, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF">
    GISPulse
  </text>
</svg>
