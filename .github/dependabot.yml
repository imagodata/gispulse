version: 2

updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      # Minor/patch bumps batch into one PR to keep noise down.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      # Major bumps stay individual so they get reviewed properly.
      api-stack:
        applies-to: version-updates
        patterns:
          - fastapi
          - uvicorn*
          - starlette
          - pydantic*
        update-types:
          - major
      geo-stack:
        applies-to: version-updates
        patterns:
          - geopandas
          - shapely
          - pyproj
          - fiona
          - pyogrio
          - rasterio
        update-types:
          - major
      duckdb-stack:
        applies-to: version-updates
        patterns:
          - duckdb
          - pyarrow
        update-types:
          - major
      # Security advisories ship as their own PR regardless of grouping.
      security:
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions — keep workflow versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
