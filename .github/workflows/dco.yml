name: DCO

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

jobs:
  dco-check:
    name: DCO sign-off check
    runs-on: ubuntu-latest

    steps:
      - name: Bypass DCO for trusted bots (dependabot, github-actions)
        id: bot_check
        run: |
          actor='${{ github.event.pull_request.user.login }}'
          case "$actor" in
            "dependabot[bot]"|"github-actions[bot]"|"renovate[bot]")
              echo "Skipping DCO for trusted bot: $actor"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: actions/checkout@v6
        if: steps.bot_check.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by trailer on every commit
        if: steps.bot_check.outputs.skip != 'true'
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          fail=0
          # Every commit on the PR branch (excluding the merge base) must
          # carry a Signed-off-by trailer that matches the author email.
          for sha in $(git rev-list --no-merges "$BASE..$HEAD"); do
            author_email=$(git log -1 --format="%ae" "$sha")
            author_name=$(git log -1 --format="%an" "$sha")
            signoff=$(git log -1 --format=%B "$sha" | grep -E '^Signed-off-by: ' || true)
            if [ -z "$signoff" ]; then
              echo "::error ::Commit $sha is missing Signed-off-by"
              echo "  Author: $author_name <$author_email>"
              echo "  Run \`git commit -s\` to add the DCO trailer."
              fail=1
              continue
            fi
            if ! echo "$signoff" | grep -q "<$author_email>"; then
              echo "::error ::Commit $sha Signed-off-by does not match author email"
              echo "  Found  : $signoff"
              echo "  Author : $author_name <$author_email>"
              fail=1
            fi
          done
          if [ $fail -ne 0 ]; then
            echo ""
            echo "DCO check failed. See CONTRIBUTING.md for how to add Signed-off-by."
            exit 1
          fi
          echo "DCO check passed."
