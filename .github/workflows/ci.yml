name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (with extras needed by router/integration tests)
        run: pip install -e ".[dev,api,postgis,mcp,raster,network,classification,pointcloud,scheduling,sso,parquet]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=gispulse --cov=core --cov=capabilities --cov=rules --cov=persistence --cov=adapters --cov=orchestration --cov=catalog --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Run integration tests (excluding PostGIS)
        run: pytest tests/integration/ -v --ignore=tests/integration/test_postgis.py --cov=gispulse --cov=core --cov=capabilities --cov=rules --cov=persistence --cov=adapters --cov=orchestration --cov=catalog --cov-report=term-missing --cov-append

      - name: Type check with mypy (core modules)
        run: |
          pip install mypy types-requests
          mypy core/ capabilities/ rules/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  capability-matrix-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project with all capability-bearing extras
        run: pip install -e ".[api,postgis,mcp,raster,network,classification,pointcloud,scheduling,sso,parquet]"

      - name: Verify capability coverage matrix is up to date
        run: |
          python scripts/build_capability_matrix.py
          if ! git diff --quiet docs-site/; then
            echo "::error::Capability matrix drift detected. Diff below:"
            git --no-pager diff docs-site/
            exit 1
          fi
          echo "Matrix in sync."

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -e ".[all]" --ignore-requires-python || pip install -e ".[dev]"

      - name: Run pip-audit
        # NB: --fix-auto was removed upstream in pip-audit >= 2.8 (replaced by
        # the boolean --fix flag, which defaults to off). We rely on the
        # default no-fix behaviour here.
        # CVE-2026-3219 (pip 26.x tar/ZIP confusion) has no fix release as of
        # 2026-04-28 — ignored until upstream patch lands. Re-evaluate quarterly.
        run: pip-audit --desc on --ignore-vuln CVE-2026-3219

  # NB: the `build-portal` job was removed when the portal frontend was
  # split out to the sibling public repository imagodata/gispulse-portal
  # (AGPL). Lint / build / test of the portal now runs in that repo's own
  # CI. This `gispulse` repo only ships the Python engine + viewer.

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: gispulse:ci
          cache-from: type=gha
          cache-to: type=gha,mode=min
