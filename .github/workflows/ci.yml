name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=gispulse --cov=core --cov=capabilities --cov=rules --cov=persistence --cov=adapters --cov=orchestration --cov=catalog --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Run integration tests (excluding PostGIS)
        run: pytest tests/integration/ -v --ignore=tests/integration/test_postgis.py --cov=gispulse --cov=core --cov=capabilities --cov=rules --cov=persistence --cov=adapters --cov=orchestration --cov=catalog --cov-report=term-missing --cov-append

      - name: Type check with mypy (core modules)
        run: |
          pip install mypy types-requests
          mypy core/ capabilities/ rules/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -e ".[all]" --ignore-requires-python || pip install -e ".[dev]"

      - name: Run pip-audit
        run: pip-audit --desc on --fix-auto=off

  build-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install portal dependencies
        working-directory: portal
        run: npm ci

      - name: Lint portal
        working-directory: portal
        run: npx eslint . --max-warnings 0 || true
        continue-on-error: true

      - name: Run portal tests
        working-directory: portal
        run: npx vitest run --reporter=verbose || true
        continue-on-error: true

      - name: Build portal
        working-directory: portal
        run: npm run build

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: gispulse:ci
          cache-from: type=gha
          cache-to: type=gha,mode=min
