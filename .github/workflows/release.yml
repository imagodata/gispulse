name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── 1. Build wheel + sdist, publish to TestPyPI then PyPI ───────────
  publish-pypi:
    name: Publish gispulse to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tooling
        run: pip install build twine

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          echo "Tag: $TAG_VERSION"
          echo "pyproject.toml: $PYPROJECT_VERSION"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "ERROR: tag and pyproject.toml versions differ"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify package metadata
        run: twine check dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Smoke test from TestPyPI
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Allow TestPyPI index to settle
          sleep 20
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "gispulse==$VERSION"
          /tmp/smoke/bin/python -c "import gispulse; print('import ok')"
          /tmp/smoke/bin/gispulse --help >/dev/null

      - name: Publish to PyPI (production)
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 2. Create GitHub Release with sdist + wheel attached ────────────
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build artifacts
        run: |
          pip install build
          python -m build

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the section between "## [VERSION]" and the next "## [" header
          awk -v v="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if ($0 ~ "## \\[" v "\\]") in_section = 1
              else next
            }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          echo "Notes :"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "GISPulse ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            dist/*.whl dist/*.tar.gz dist/SHA256SUMS

  # ── 3. Docker image to GHCR (deferred — current Dockerfile bundles portal/
  #      which now lives in gispulse-portal repo. Will reinstate once the
  #      Dockerfile is rewritten as engine-only API container.)
